<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Conecte-se com a LUDUT</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html{
      width: 100%;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body{
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      color: #111111;
    }

    .connect-ludut{
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 32px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .connect-card{
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 28px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.08);
      padding: 40px 24px;
      text-align: center;
    }

    .connect-logo-wrap{
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
    }

    .connect-logo{
      width: 100%;
      max-width: 170px;
      height: auto;
      display: block;
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.14);
      object-fit: contain;
    }

    .connect-card h2{
      margin-bottom: 10px;
      font-size: 32px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .connect-card p{
      margin-bottom: 30px;
      font-size: 16px;
      line-height: 1.55;
      color: #5a5a5a;
    }

    .connect-buttons{
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .connect-btn{
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      text-decoration: none;
      color: #ffffff;
      padding: 18px 20px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      text-align: left;
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .connect-btn:hover{
      transform: translateY(-2px);
    }

    .whatsapp-btn,
    .location-btn{
      background: linear-gradient(180deg, #111111 0%, #000000 100%);
    }

    .vip-btn{
      background: linear-gradient(180deg, #8b6b2f 0%, #c79a3b 100%);
      box-shadow: 0 12px 28px rgba(199,154,59,0.28);
    }

    .btn-icon{
      width: 38px;
      min-width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg{
      width: 18px;
      height: 18px;
      display: block;
    }

    .btn-text{
      flex: 1;
      display: block;
    }

    @media (max-width: 768px){
      body{
        background: #ffffff;
      }

      .connect-ludut{
        padding: 0;
      }

      .connect-card{
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 28px 16px 32px;
      }

      .connect-logo-wrap{
        margin-bottom: 20px;
      }

      .connect-logo{
        max-width: 118px;
        border-radius: 18px;
      }

      .connect-card h2{
        font-size: 28px;
        margin-bottom: 10px;
      }

      .connect-card p{
        font-size: 15px;
        margin-bottom: 24px;
      }

      .connect-buttons{
        max-width: 100%;
        gap: 14px;
      }

      .connect-btn{
        padding: 18px 18px;
        min-height: 60px;
        font-size: 16px;
      }

      .btn-icon{
        width: 36px;
        min-width: 36px;
        height: 36px;
      }

      .btn-text{
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <section class="connect-ludut">
    <div class="connect-card">
      <div class="connect-logo-wrap">
        <img
          src="https://raw.githubusercontent.com/contatoludut/Conecte-se/refs/heads/main/f8714728-2760-4e87-b7ae-f6c999f77296_IMG-6926.webp"
          alt="Logo LUDUT"
          class="connect-logo"
        />
      </div>

      <h2>Conecte-se com a LUDUT</h2>
      <p>Utilize nossos canais digitais abaixo</p>

      <div class="connect-buttons">
        <a href="https://wa.me/5581991690494" class="connect-btn whatsapp-btn" target="_blank" rel="noopener noreferrer">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="currentColor">
              <path d="M19.11 17.21c-.29-.15-1.69-.83-1.95-.92-.26-.1-.45-.15-.64.15-.19.29-.74.92-.91 1.11-.17.2-.33.22-.62.07-.29-.15-1.2-.44-2.29-1.39-.85-.76-1.43-1.69-1.59-1.98-.17-.29-.02-.44.12-.58.13-.13.29-.33.44-.49.15-.17.2-.29.29-.49.1-.2.05-.37-.02-.52-.07-.15-.64-1.54-.88-2.11-.23-.55-.47-.48-.64-.49h-.55c-.2 0-.52.07-.79.37-.27.29-1.04 1.01-1.04 2.46s1.06 2.86 1.21 3.06c.15.2 2.08 3.17 5.05 4.45.71.31 1.27.49 1.7.63.71.22 1.36.19 1.87.12.57-.08 1.69-.69 1.93-1.35.24-.66.24-1.22.17-1.34-.07-.12-.26-.2-.55-.34z"/>
              <path d="M16.03 3C8.85 3 3.03 8.81 3.03 15.98c0 2.3.6 4.55 1.74 6.54L3 29l6.69-1.75a12.94 12.94 0 0 0 6.34 1.62h.01c7.18 0 13-5.81 13-12.98C29.03 8.81 23.21 3 16.03 3zm0 23.72h-.01c-1.95 0-3.87-.52-5.55-1.49l-.4-.23-3.97 1.04 1.06-3.87-.26-.4a10.8 10.8 0 0 1-1.66-5.75c0-5.98 4.86-10.84 10.83-10.84 2.9 0 5.63 1.13 7.67 3.17a10.77 10.77 0 0 1 3.17 7.67c0 5.97-4.87 10.83-10.84 10.83z"/>
            </svg>
          </span>
          <span class="btn-text">WhatsApp Loja Física</span>
        </a>

        <a href="https://www.google.com/maps/place/LUDUT/@-8.1197627,-35.2990657,17z/data=!3m1!4b1!4m6!3m5!1s0x7aa54a5cd96cff7:0xa4d452c85e18e630!8m2!3d-8.119768!4d-35.2964908!16s%2Fg%2F11vhqfc9c5?entry=ttu&g_ep=EgoyMDI2MDMxMS4wIKXMDSoASAFQAw%3D%3D" class="connect-btn location-btn" target="_blank" rel="noopener noreferrer">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 21s-6-5.33-6-11a6 6 0 1 1 12 0c0 5.67-6 11-6 11z"/>
              <circle cx="12" cy="10" r="2.3"/>
            </svg>
          </span>
          <span class="btn-text">Localize nossa loja</span>
        </a>

        <a href="#" class="connect-btn vip-btn">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 11V9a5 5 0 0 1 10 0v2"/>
              <rect x="5" y="11" width="14" height="10" rx="2"/>
              <circle cx="12" cy="16" r="1"/>
            </svg>
          </span>
          <span class="btn-text">Grupo exclusivo no WhatsApp</span>
        </a>
      </div>
    </div>
  </section>
</body>
</html>
